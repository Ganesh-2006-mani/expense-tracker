<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Expense Tracker</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
  <h2>💰 Expense Tracker</h2>

  <h3>Balance: <span id="balance">₹0</span></h3>

  <div class="summary">
    <p>Income: <span id="income">₹0</span></p>
    <p>Expense: <span id="expense">₹0</span></p>
  </div>

  <!-- FORM -->
  <form id="form">
    <input type="text" id="text" placeholder="Enter description">

    <input type="number" id="amount" placeholder="Enter amount (+income / -expense)">

    <!-- CATEGORY -->
    <select id="category">
      <option value="Food">Food</option>
      <option value="Travel">Travel</option>
      <option value="Shopping">Shopping</option>
      <option value="Bills">Bills</option>
      <option value="Salary">Salary</option>
    </select>

    <button>Add Transaction</button>
  </form>

  <!-- LIST -->
  <ul id="list"></ul>

  <!-- CHART -->
  <canvas id="chart"></canvas>

</div>

<!-- Chart.js -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script src="script.js"></script>
</body>
</html>
